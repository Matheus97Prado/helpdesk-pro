{% extends "base.html" %}

{% block title %}Novo Chamado{% endblock %}
{% block page_title %}Abrir Chamado{% endblock %}
{% block breadcrumb %}Início &rsaquo; <a href="{{ url_for('dashboard') }}">Dashboard</a> &rsaquo; Novo Chamado{% endblock %}

{% block content %}
<div class="form-page">
    <div class="form-card">
        <div class="form-card-header">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                <polyline points="14 2 14 8 20 8"/>
                <line x1="12" y1="18" x2="12" y2="12"/>
                <line x1="9" y1="15" x2="15" y2="15"/>
            </svg>
            <h2>Novo Chamado de Suporte</h2>
        </div>

        <form method="POST" action="{{ url_for('novo_chamado') }}" class="helpdesk-form">
            <div class="form-row">
                <div class="form-group full-width">
                    <label for="title">Título do Chamado <span class="required">*</span></label>
                    <input type="text" id="title" name="title" required
                           placeholder="Ex: Problema ao acessar sistema de vendas"
                           class="form-input">
                </div>
            </div>

            <div class="form-row two-cols">
                <div class="form-group">
                    <label for="client_id">Cliente <span class="required">*</span></label>
                    <select id="client_id" name="client_id" required class="form-input">
                        <option value="">Selecione o cliente...</option>
                        {% for client in clients %}
                            <option value="{{ client.id }}">{{ client.name }} — {{ client.company }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="category">Categoria</label>
                    <select id="category" name="category" class="form-input">
                        <option value="">Selecione...</option>
                        <option value="Suporte Técnico">Suporte Técnico</option>
                        <option value="Instalação">Instalação</option>
                        <option value="Configuração">Configuração</option>
                        <option value="Visita Técnica">Visita Técnica</option>
                        <option value="Manutenção">Manutenção</option>
                        <option value="Hardware">Hardware</option>
                        <option value="Rede">Rede</option>
                        <option value="Software">Software</option>
                        <option value="Treinamento">Treinamento</option>
                        <option value="Outro">Outro</option>
                    </select>
                </div>
            </div>

            <div class="form-row two-cols">
                <div class="form-group">
                    <label for="priority">Prioridade <span class="required">*</span></label>
                    <select id="priority" name="priority" required class="form-input">
                        <option value="baixa">Baixa</option>
                        <option value="media" selected>Média</option>
                        <option value="alta">Alta</option>
                        <option value="urgente">Urgente</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="assigned_to">Atribuir para</label>
                    <select id="assigned_to" name="assigned_to" class="form-input">
                        <option value="">Não atribuído</option>
                        {% for agent in agents %}
                        <option value="{{ agent.login }}">{{ agent.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group full-width">
                    <label for="description">Descrição <span class="required">*</span></label>
                    <textarea id="description" name="description" required rows="5"
                              placeholder="Descreva o problema detalhadamente: o que acontece, quando começou, mensagens de erro..."
                              class="form-input form-textarea"></textarea>
                </div>
            </div>

            <!-- Priority Preview -->
            <div class="priority-preview" id="priorityPreview">
                <div class="priority-indicator"></div>
                <span id="priorityText">Prioridade: Média</span>
            </div>

            <div class="form-actions">
                <a href="{{ url_for('dashboard') }}" class="btn btn-ghost">Cancelar</a>
                <button type="submit" class="btn btn-primary">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                    Abrir Chamado
                </button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
