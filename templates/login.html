<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — HelpDesk Pro</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-container">
    <div class="login-card">

        <!-- Logo -->
        <div class="login-header">
            <div class="login-logo">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"
                          stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </div>
            <h1 class="login-title">HelpDesk Pro</h1>
            <p class="login-subtitle">Faça login para acessar o sistema</p>
        </div>

        <!-- Flash messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                <div class="flash flash-{{ category }}" style="margin-bottom:16px">
                    <div class="flash-content">{{ message }}</div>
                </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login form -->
        <form method="POST" class="login-form">
            <div class="form-group">
                <label class="form-label" for="login-input">Login ou E-mail</label>
                <input type="text" id="login-input" name="login" class="form-input" required
                       placeholder="seu.login ou email@empresa.com"
                       value="{{ request.form.get('login', '') }}" autofocus>
            </div>
            <div class="form-group">
                <label class="form-label" for="password-input">Senha</label>
                <div style="position:relative">
                    <input type="password" id="password-input" name="password" class="form-input" required
                           placeholder="••••••••" style="padding-right:44px">
                    <button type="button"
                            onclick="togglePwd()"
                            style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--gray-400);padding:0">
                        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary login-btn">
                Entrar no Sistema
            </button>
        </form>

    </div>
</div>

<script>
function togglePwd() {
    const inp = document.getElementById('password-input');
    inp.type = inp.type === 'password' ? 'text' : 'password';
}
</script>
</body>
</html>
